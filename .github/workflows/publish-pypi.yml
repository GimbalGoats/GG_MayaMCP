name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: Publish Python distributions to PyPI after building release artifacts.
        type: boolean
        default: false

jobs:
  build-mcpb:
    name: Build Claude Desktop MCPB
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb
      - name: Install smoke-test dependencies
        run: python -m pip install -e .
      - name: Check release versions
        id: versions
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $manifest = Get-Content packaging\claude-mcpb\manifest.json -Raw | ConvertFrom-Json
          $pyprojectVersion = python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          if ($manifest.version -ne $pyprojectVersion) {
            throw "MCPB manifest version $($manifest.version) does not match pyproject version $pyprojectVersion"
          }
          if ($env:RELEASE_TAG) {
            $tagVersion = $env:RELEASE_TAG -replace '^v', ''
            if ($tagVersion -ne $manifest.version) {
              throw "Release tag $env:RELEASE_TAG does not match package version $($manifest.version)"
            }
          }
          "package_version=$($manifest.version)" >> $env:GITHUB_OUTPUT
          "asset_name=maya-mcp-$($manifest.version).mcpb" >> $env:GITHUB_OUTPUT
      - name: Build MCPB package
        shell: pwsh
        run: .\packaging\claude-mcpb\build.ps1
      - name: Inspect MCPB package
        shell: pwsh
        run: |
          mcpb validate dist\mcpb\maya-mcp\manifest.json
          mcpb info dist\mcpb\maya-mcp\maya-mcp.mcpb
      - name: Smoke test MCPB package
        shell: pwsh
        run: |
          mcpb unpack dist\mcpb\maya-mcp\maya-mcp.mcpb dist\mcpb-smoke
          python packaging\claude-mcpb\smoke_test.py dist\mcpb-smoke --expected-tools 71
      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\release | Out-Null
          Copy-Item dist\mcpb\maya-mcp\maya-mcp.mcpb "dist\release\${{ steps.versions.outputs.asset_name }}"
      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-mcpb-${{ steps.versions.outputs.package_version }}
          path: dist/release/${{ steps.versions.outputs.asset_name }}
      - name: Attach MCPB to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/${{ steps.versions.outputs.asset_name }}

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build, build-mcpb]
    if: github.event_name == 'release' || github.event.inputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/maya-mcp
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
