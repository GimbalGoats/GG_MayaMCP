name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-mcpb:
    name: Build Claude Desktop MCPB
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb
      - name: Install smoke-test dependencies
        run: python -m pip install -e .
      - name: Build MCPB package
        shell: pwsh
        run: .\packaging\claude-mcpb\build.ps1
      - name: Inspect MCPB package
        shell: pwsh
        run: |
          mcpb validate packaging\claude-mcpb\manifest.json
          mcpb info dist\mcpb\maya-mcp\maya-mcp.mcpb
      - name: Smoke test MCPB package
        shell: pwsh
        run: |
          mcpb unpack dist\mcpb\maya-mcp\maya-mcp.mcpb dist\mcpb-smoke
          python packaging\claude-mcpb\smoke_test.py dist\mcpb-smoke --expected-tools 71
      - name: Prepare release asset
        shell: pwsh
        run: |
          $manifest = Get-Content packaging\claude-mcpb\manifest.json -Raw | ConvertFrom-Json
          New-Item -ItemType Directory -Path dist\release | Out-Null
          Copy-Item dist\mcpb\maya-mcp\maya-mcp.mcpb "dist\release\maya-mcp-$($manifest.version).mcpb"
      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-mcpb
          path: dist/release/*.mcpb
      - name: Attach MCPB to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.mcpb

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build, build-mcpb]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/maya-mcp
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
