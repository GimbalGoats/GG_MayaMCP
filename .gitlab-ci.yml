# GitLab CI/CD Pipeline for Maya MCP
# Runs only on merge requests (not on every push)

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# Lightweight setup for lint jobs (no full deps)
.lint-setup: &lint-setup
  image: python:3.10-slim
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[lint]"

# Test setup needs pytest
.test-setup: &test-setup
  image: python:3.10-slim
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[test]"

ruff-lint:
  <<: *lint-setup
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

mypy:
  <<: *lint-setup
  stage: lint
  script:
    - mypy src/

pytest:
  <<: *test-setup
  stage: test
  script:
    # Skip integration tests in CI (they require Maya running)
    - pytest --junitxml=report.xml --ignore=tests/integration
  artifacts:
    when: always
    reports:
      junit: report.xml
